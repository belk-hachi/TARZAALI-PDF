<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ patient_name }} - Lab PDF Processor</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/google_style.css') }}" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Variables */
            --bg-body: #f1f3f4;
            --bg-surface: #ffffff;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border-color: #dadce0;
            --hover-bg: #f1f3f4;
        }

        [data-theme="dark"] {
            --bg-body: #202124;
            --bg-surface: #303134;
            --text-main: #e8eaed;
            --text-muted: #9aa0a6;
            --border-color: #3c4043;
            --hover-bg: #3c4043;
        }

        body { 
            background: var(--bg-body); 
            color: var(--text-main);
            margin: 0; 
            transition: background-color 0.3s, color 0.3s;
        }
        .toolbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.1), 0 2px 6px 2px rgba(60,64,67,0.05);
            transition: background-color 0.3s, border-color 0.3s;
        }
        [data-theme="dark"] .toolbar {
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.3), 0 4px 8px 3px rgba(0,0,0,0.15);
        }
        .toolbar h5 { margin: 0; font-weight: 500; color: var(--text-main); font-size: 1.15rem; }
        .toolbar-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .pdf-container {
            display: flex; justify-content: center; padding: 20px;
            min-height: calc(100vh - 64px);
        }
        .pdf-frame {
            width: 96%; height: calc(100vh - 104px);
            border: none; border-radius: 16px;
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            background-color: var(--bg-surface);
        }
        [data-theme="dark"] .pdf-frame {
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.5), 0 4px 16px 3px rgba(0,0,0,0.4);
        }

        /* Theme Toggle Button */
        #theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-main);
        }
        #theme-toggle:hover {
            background: var(--hover-bg);
            transform: scale(1.08);
        }
    </style>
    <script>
        // Apply theme immediately to prevent flicker
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="toolbar">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <div class="d-flex align-items-center gap-3">
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Retour
                </a>
                <div id="theme-toggle" onclick="toggleTheme()" title="Changer de thème">
                    <i class="bi bi-sun" id="theme-icon"></i>
                </div>
            </div>
            
            <div class="toolbar-title">
                <h5>
                    {% if is_source %}
                        <i class="bi bi-file-earmark-pdf"></i> Liste : {{ patient_name }}
                    {% else %}
                        <i class="bi bi-person"></i> {{ patient_name }}
                    {% endif %}
                </h5>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary btn-sm btn-action" onclick="printPdf()">
                    <i class="bi bi-printer"></i> Imprimer
                </button>
                {% if not is_source %}
                    {% if session_id == 'partial' %}
                        <a href="/download-partial/{{ pdf_filename }}" class="btn btn-primary btn-sm btn-action">
                            <i class="bi bi-download"></i> Télécharger
                        </a>
                    {% else %}
                        <a href="/download/{{ session_id }}/{{ patient_index }}" class="btn btn-primary btn-sm btn-action">
                            <i class="bi bi-download"></i> Télécharger
                        </a>
                    {% endif %}
                {% endif %}
            </div>
        </div>
    </div>

    <div class="pdf-container">
        <iframe id="pdf-frame" class="pdf-frame" src="{% if is_source %}/source-pdf/{{ pdf_filename }}{% else %}/pdf/{{ pdf_filename }}{% endif %}"></iframe>
    </div>

    <script>
        /* --- Theme Toggle Logic --- */
        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = theme === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun';
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            updateThemeIcon(savedTheme);
        });

        function printPdf() {
            const frame = document.getElementById('pdf-frame');
            const pdfUrl = "{% if is_source %}/source-pdf/{{ pdf_filename }}{% else %}/pdf/{{ pdf_filename }}{% endif %}";
            if (frame.contentWindow) {
                frame.contentWindow.focus();
                frame.contentWindow.print();
            } else {
                // Fallback: open PDF in new tab for printing
                window.open(pdfUrl, '_blank');
            }
        }
    </script>
</body>
</html>
